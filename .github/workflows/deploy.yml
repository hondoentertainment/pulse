name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # Quality gate — runs before any deployment
  # -------------------------------------------------------------------------
  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (strict)
        run: npm run lint -- --max-warnings 0

      - name: Unit tests
        run: npm run test
        env:
          CI: true

      - name: Build
        run: npm run build

      - name: Bundle size check (≤ 1,500 KB)
        run: |
          BUDGET_KB=1500
          TOTAL_KB=$(find dist/assets -name '*.js' -exec wc -c {} + 2>/dev/null \
            | tail -1 | awk '{printf "%.0f", $1/1024}')
          echo "Total JS bundle size: ${TOTAL_KB} KB (budget: ${BUDGET_KB} KB)"
          if [ "${TOTAL_KB}" -gt "${BUDGET_KB}" ]; then
            echo "ERROR: Bundle exceeds ${BUDGET_KB} KB budget."
            exit 1
          fi

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm run test:smoke

  # -------------------------------------------------------------------------
  # Staging deployment — always runs after quality gate
  # -------------------------------------------------------------------------
  deploy_staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [quality_gate]
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.preview_url }}
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy staging to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"
          npx vercel build --token "$VERCEL_TOKEN"
          DEPLOY_URL=$(npx vercel deploy --prebuilt --token "$VERCEL_TOKEN")
          echo "preview_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "Staging URL: ${DEPLOY_URL}"

      - name: Health check — staging
        run: |
          URL="${{ steps.deploy.outputs.preview_url }}"
          echo "Checking staging health at: ${URL}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "${URL}")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [ "${STATUS}" = "200" ]; then
              echo "Staging health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Staging health check failed after 5 attempts."
          exit 1

  # -------------------------------------------------------------------------
  # Production deployment — only runs when target=production AND staging passed
  # Requires manual approval via GitHub Environment protection rules
  # -------------------------------------------------------------------------
  deploy_production:
    name: Deploy → Production
    if: ${{ inputs.target == 'production' }}
    runs-on: ubuntu-latest
    needs: [deploy_staging]
    # The "production" GitHub Environment should have:
    #   - Required reviewers (at least one team lead must approve)
    #   - Wait timer (optional: e.g., 5 minutes to allow cancellation)
    environment:
      name: production
      url: ${{ steps.deploy_prod.outputs.production_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy production to Vercel
        id: deploy_prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel build --prod --token "$VERCEL_TOKEN"
          PROD_URL=$(npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN")
          echo "production_url=${PROD_URL}" >> "$GITHUB_OUTPUT"
          echo "Production URL: ${PROD_URL}"

      - name: Health check — production
        run: |
          URL="${{ steps.deploy_prod.outputs.production_url }}"
          echo "Checking production health at: ${URL}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "${URL}")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [ "${STATUS}" = "200" ]; then
              echo "Production health check passed."
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: Production health check failed after 5 attempts."
          echo "ROLLBACK: Promote previous deployment in Vercel Dashboard immediately."
          exit 1

      - name: Deployment summary
        run: |
          echo "### Production Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** ${{ steps.deploy_prod.outputs.production_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next steps:**" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Monitor Sentry for new errors (15-minute watch window)" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Verify critical flows: load → discover → venue → pulse" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check Vercel Analytics for performance regressions" >> "$GITHUB_STEP_SUMMARY"
